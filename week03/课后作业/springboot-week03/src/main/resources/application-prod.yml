# 阿⾥云短信配置（短信认证服务 - 个⼈免资质）
aliyun:
  sms:
    # 是否启⽤短信服务
    enabled: true
    # 服务端点配置
    endpoint: dypnsapi.aliyuncs.com
    region-id: cn-jiangsu
    # 敏感信息：建议⽤环境变量覆盖，不写死在配置中
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    # 赠送签名（⻅ 1.3 赠送签名配置）
    sign-name: "云渚科技验证平台"
    # 赠送模板 CODE（⻅ 1.4 赠送模板配置）
    template-code: "100002"
    # ⽅案名称，可选，不填为默认⽅案
    scheme-name:

